<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Services — Stanly Serang</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#FAFAF7;--ink:#141412;--ink-light:#3D3D38;
  --ink-muted:#8C8C84;--border:#E4E0D6;
  --accent:#e26d06;--accent-dark:#bf5c04;--accent-pale:#FDF0E3;
}
html,body{height:100%;overflow:hidden}
body{background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;animation:pageIn 0.7s ease forwards}
@keyframes pageIn{from{opacity:0}to{opacity:1}}

/* NAV */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:1.3rem 3rem;
  display:flex;align-items:center;
  background:rgba(250,250,247,0.92);backdrop-filter:blur(16px);
  border-bottom:0.5px solid var(--border);
}
.nav-logo{
  display:flex;align-items:center;gap:0.8rem;
  text-decoration:none;
}
.nav-logo-text{
  font-family:'Cormorant Garamond',serif;
  font-size:1.25rem;font-weight:600;letter-spacing:0.08em;color:var(--ink);
}
.nav-back{
  font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--ink-muted);display:flex;align-items:center;gap:0.4rem;
  transition:color 0.2s;
}
.nav-back svg{stroke:currentColor;fill:none;stroke-width:1.2;stroke-linecap:round;stroke-linejoin:round}
.nav-logo:hover .nav-back{color:var(--accent)}

/* WIP GHOST TEXT */
.wip-ghost{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-family:'Cormorant Garamond',serif;
  font-size:22vw;font-weight:600;
  color:rgba(20,20,18,0.04);
  letter-spacing:0.15em;
  user-select:none;pointer-events:none;
  white-space:nowrap;
  z-index:0;
}

/* CENTER CONTENT */
.center{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  padding:2rem;
  z-index:1;
}
.page-label{
  font-size:0.65rem;letter-spacing:0.22em;text-transform:uppercase;
  color:var(--accent);display:flex;align-items:center;gap:0.7rem;
  margin-bottom:1.2rem;
  animation:fadeUp 0.8s 0.2s both;
}
.page-label::before,
.page-label::after{content:'';width:24px;height:0.5px;background:var(--accent);display:block}

.page-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2.5rem,5vw,4.5rem);
  font-weight:300;letter-spacing:0.04em;
  color:var(--ink);margin-bottom:1.2rem;
  animation:fadeUp 0.8s 0.35s both;
}

/* ANIMATED DOTS */
.dots{
  display:flex;align-items:center;gap:0.5rem;
  margin-bottom:1.8rem;
  animation:fadeUp 0.8s 0.5s both;
}
.dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--accent);
  animation:bounce 1.4s infinite ease-in-out;
}
.dot:nth-child(1){animation-delay:0s}
.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{
  0%,80%,100%{transform:translateY(0);opacity:0.4}
  40%{transform:translateY(-8px);opacity:1}
}

.page-desc{
  font-size:0.88rem;line-height:1.9;
  color:var(--ink-muted);font-weight:300;
  max-width:380px;margin-bottom:2.2rem;
  animation:fadeUp 0.8s 0.6s both;
}

/* BUTTON */
.btn-contact{
  display:inline-flex;align-items:center;gap:0.6rem;
  background:transparent;
  border:0.5px solid var(--border);
  color:var(--ink-light);
  padding:0.85rem 2rem;
  font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;
  font-family:'DM Sans',sans-serif;font-weight:400;
  cursor:pointer;text-decoration:none;
  transition:border-color 0.3s,color 0.3s;
  position:relative;overflow:hidden;
  animation:fadeUp 0.8s 0.75s both;
}
.btn-contact::before{
  content:'';position:absolute;inset:0;
  background:var(--accent);
  transform:translateX(-101%);
  transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
  z-index:-1;
}
.btn-contact:hover{border-color:var(--accent);color:#fff}
.btn-contact:hover::before{transform:translateX(0)}
.btn-contact svg{stroke:currentColor;fill:none;stroke-width:1.2;stroke-linecap:round;stroke-linejoin:round;transition:transform 0.2s}
.btn-contact:hover svg{transform:translateX(3px)}

/* FOOTER */
.footer-copy{
  position:fixed;bottom:1.5rem;left:0;right:0;
  text-align:center;
  font-size:0.62rem;color:rgba(20,20,18,0.25);letter-spacing:0.05em;
  animation:fadeUp 0.8s 0.9s both;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}

/* MOBILE */
@media(max-width:768px){
  .nav{padding:1.3rem 1.5rem}
  .wip-ghost{font-size:35vw}
  .page-desc{font-size:0.82rem;max-width:300px}
  .btn-contact{padding:0.85rem 1.6rem}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a class="nav-logo" href="main.html">
    <span class="nav-logo-text">SS</span>
    <span class="nav-back">
      <svg width="12" height="12" viewBox="0 0 12 12"><path d="M10 6H2M5 2L1 6l4 4"/></svg>
      Menu Utama
    </span>
  </a>
</nav>

<!-- WIP GHOST -->
<div class="wip-ghost">WIP</div>

<!-- CENTER CONTENT -->
<div class="center">
  <div class="page-label">Services</div>
  <div class="page-title">Coming Soon</div>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <p class="page-desc">Maaf halaman ini belum ready banget.. tapi kalau kamu butuh sesuatu / pengen kerjasama, boleh click link di bawah ini yaa</p>
  <a class="btn-contact" href="contact.html">
    Get in Touch
    <svg width="13" height="13" viewBox="0 0 13 13"><path d="M1.5 6.5h10M7.5 2.5l4 4-4 4"/></svg>
  </a>
</div>

<!-- FOOTER -->
<div class="footer-copy">© 2026 — Stanly Serang. All Rights Reserved.</div>

</body>
</html>
