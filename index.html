<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stanly Serang</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#FAFAF7;
  --ink:#141412;
  --accent:#e26d06;
  --accent-dark:#bf5c04;
}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--ink)}

/* ── BACKGROUND PHOTO ── */
.entry-bg{
  position:fixed;inset:0;z-index:0;
  background:var(--ink);
}
.entry-bg picture,
.entry-bg img{
  width:100%;height:100%;
  object-fit:cover;
  object-position:center center;
  display:block;
}
/* overlay gradient supaya teks terbaca */
.entry-bg::after{
  content:'';
  position:absolute;inset:0;
  background:
    linear-gradient(to top, rgba(20,20,18,0.72) 0%, rgba(20,20,18,0.45) 45%, rgba(20,20,18,0.30) 100%),
    linear-gradient(to right, rgba(20,20,18,0.30) 0%, transparent 60%);
}

/* ── PAGE TRANSITION ── */
.page-transition{
  position:fixed;inset:0;z-index:999;
  background:var(--ink);
  opacity:0;pointer-events:none;
  transition:opacity 0.75s ease;
}
.page-transition.active{opacity:1;pointer-events:all}

/* ── CORNER: Logo TL ── */
.corner-tl{
  position:fixed;top:2rem;left:2.5rem;z-index:10;
  font-family:'Cormorant Garamond',serif;
  font-size:1.15rem;font-weight:600;letter-spacing:0.1em;
  color:rgba(250,250,247,0.6);
  opacity:0;animation:fadeUp 1s 0.2s forwards;
}

/* ── CORNER: Motto BR ── */
.corner-br{
  position:fixed;bottom:2.2rem;right:2.5rem;z-index:10;
  text-align:right;
  opacity:0;animation:fadeUp 1s 1.4s forwards;
}
.motto{
  font-family:'Cormorant Garamond',serif;
  font-size:0.78rem;font-style:italic;font-weight:300;
  letter-spacing:0.1em;
  color:rgba(250,250,247,0.65);
}
.corner-location{
  font-size:0.6rem;letter-spacing:0.16em;text-transform:uppercase;
  color:rgba(250,250,247,0.4);margin-top:5px;
}

/* ── CORNER: Scroll Indicator BL ── */
.corner-bl{
  position:fixed;bottom:2.2rem;left:2.5rem;z-index:10;
  display:flex;align-items:center;gap:0.6rem;
  opacity:0;animation:fadeUp 1s 1.6s forwards;
}
.scroll-line{
  width:1px;height:36px;
  background:rgba(250,250,247,0.2);
  position:relative;overflow:hidden;
}
.scroll-line::after{
  content:'';
  position:absolute;top:-100%;left:0;
  width:100%;height:100%;
  background:rgba(250,250,247,0.55);
  animation:scrollAnim 2.2s 2s infinite ease-in-out;
}
.scroll-label{
  font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;
  color:rgba(250,250,247,0.28);
  writing-mode:vertical-rl;transform:rotate(180deg);
}

/* ── CENTER CONTENT ── */
.entry-center{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  padding:2rem;
}
.entry-label{
  font-size:0.63rem;letter-spacing:0.22em;text-transform:uppercase;
  color:rgba(250,250,247,0.65);
  display:flex;align-items:center;gap:0.8rem;
  margin-bottom:1.6rem;
  opacity:0;animation:fadeUp 1s 0.5s forwards;
}
.entry-label::before,
.entry-label::after{
  content:'';width:28px;height:0.5px;
  background:rgba(250,250,247,0.4);display:block;
}
.entry-name{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(4rem,9vw,8rem);
  font-weight:300;line-height:0.95;
  letter-spacing:0.06em;
  color:#FAFAF7;
  opacity:0;animation:fadeUp 1s 0.7s forwards;
}
.entry-surname{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(4rem,9vw,8rem);
  font-weight:600;line-height:0.95;
  letter-spacing:0.06em;
  color:#FAFAF7;
  margin-bottom:1.8rem;
  opacity:0;animation:fadeUp 1s 0.85s forwards;
}
.entry-divider{
  width:36px;height:0.5px;
  background:var(--accent);
  margin:0 auto 1.6rem;
  opacity:0;animation:fadeUp 1s 1s forwards;
}
.entry-tagline{
  font-size:0.7rem;letter-spacing:0.16em;text-transform:uppercase;
  color:rgba(250,250,247,0.65);
  line-height:1.9;
  margin-bottom:2.8rem;
  opacity:0;animation:fadeUp 1s 1.1s forwards;
}
.entry-tagline span{
  color:rgba(250,250,247,0.35);
  margin:0 0.4rem;font-size:0.5rem;vertical-align:middle;
}

/* ── EXPLORE BUTTON ── */
.btn-explore{
  display:inline-flex;align-items:center;gap:0.8rem;
  background:transparent;
  border:0.5px solid rgba(250,250,247,0.3);
  color:#FAFAF7;
  padding:0.95rem 2.4rem;
  font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;
  font-family:'DM Sans',sans-serif;font-weight:400;
  cursor:pointer;text-decoration:none;
  transition:border-color 0.3s, color 0.3s;
  opacity:0;animation:fadeUp 1s 1.25s forwards;
  position:relative;overflow:hidden;
}
.btn-explore::before{
  content:'';
  position:absolute;inset:0;
  background:var(--accent);
  transform:translateX(-101%);
  transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
  z-index:-1;
}
.btn-explore:hover{border-color:var(--accent)}
.btn-explore:hover::before{transform:translateX(0)}
.btn-explore svg{
  stroke:currentColor;fill:none;
  stroke-width:1.2;stroke-linecap:round;stroke-linejoin:round;
  transition:transform 0.3s;width:14px;height:14px;
}
.btn-explore:hover svg{transform:translateX(4px)}

/* ── ANIMATIONS ── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(18px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes scrollAnim{
  0%{top:-100%}
  100%{top:200%}
}

/* ── MOBILE ── */
@media(max-width:768px){
  .corner-bl{display:none}
  .corner-br{
    bottom:5rem;right:1.5rem;
  }
  .corner-tl{top:1.5rem;left:1.5rem}
  .entry-label{font-size:0.58rem;gap:0.5rem;margin-bottom:1.2rem}
  .entry-label::before,.entry-label::after{width:18px}
  .entry-name,.entry-surname{font-size:clamp(3.2rem,13vw,5rem)}
  .entry-tagline{font-size:0.63rem;letter-spacing:0.12em}
  .btn-explore{padding:0.9rem 1.9rem;font-size:0.65rem;letter-spacing:0.16em}
  .motto{font-size:0.7rem}
}
</style>
</head>
<body>

<!-- TRANSITION OVERLAY -->
<div class="page-transition" id="transition"></div>

<!-- BACKGROUND -->
<div class="entry-bg">
  <picture>
    <source media="(max-width:768px)" srcset="assets/images/entry-mobile.webp">
    <img src="assets/images/entry-desktop.webp" alt="Stanly Serang" loading="eager" fetchpriority="high">
  </picture>
</div>

<!-- LOGO -->
<div class="corner-tl">SS</div>

<!-- MOTTO -->
<div class="corner-br">
  <div class="motto">"Sic Parvis Magna"</div>
  <div class="corner-location">Yogyakarta · Indonesia</div>
</div>

<!-- SCROLL INDICATOR -->
<div class="corner-bl">
  <div class="scroll-line"></div>
  <div class="scroll-label">Scroll</div>
</div>

<!-- MAIN CONTENT -->
<div class="entry-center">
  <div class="entry-label">Visual Storyteller</div>
  <div class="entry-name">Stanly</div>
  <div class="entry-surname">Serang</div>
  <div class="entry-divider"></div>
  <div class="entry-tagline">
    Photographer <span>·</span> Social Media Specialist <span>·</span> Content Creator
  </div>
  <a class="btn-explore" href="main.html" id="btn-exp">
    Explore
    <svg viewBox="0 0 14 14">
      <path d="M2 7h10M8 3l4 4-4 4"/>
    </svg>
  </a>
</div>

<script>
  // Fade out animasi ke main.html
  document.getElementById('btn-exp').addEventListener('click', function(e) {
    e.preventDefault();
    const overlay = document.getElementById('transition');
    overlay.classList.add('active');
    setTimeout(() => { window.location.href = 'main.html'; }, 750);
  });
</script>
</body>
</html>
